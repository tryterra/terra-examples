name: Publish create-tryterra-app

# Dormant until an intentional Release is cut (or run manually).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # npm trusted publishing (OIDC); provenance once repo is public
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing + provenance requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - name: Publish
        working-directory: packages/cli
        run: |
          npm ci
          npm publish
