name: Publish create-tryterra-app

# Publishes on a Release cut (or manual run). Version comes from the tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 1.2.0"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # npm trusted publishing (OIDC) + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve version from tag
        id: version
        env:
          RAW: ${{ github.event.release.tag_name || inputs.version }}
        run: echo "value=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Install
        working-directory: packages/cli
        run: npm ci

      - name: Typecheck
        working-directory: packages/cli
        run: npm run typecheck

      - name: Set version to match the release tag
        working-directory: packages/cli
        run: npm version "${{ steps.version.outputs.value }}" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: packages/cli
        # Auth via OIDC trusted publishing (configured on npm).
        run: npm publish --provenance
