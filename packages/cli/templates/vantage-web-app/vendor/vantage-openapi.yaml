          example: Quest Diagnostics - Midtown
        address:
          $ref: "#/components/schemas/AddressDTO"
        phone:
          type: string
          example: +1-212-555-0100
        hours:
          type: object
          additionalProperties:
            type: string
          description: Opening hours keyed by weekday.
          example:
            monday: 08:00-17:00
        latitude:
          type: number
          example: 40.7549
        longitude:
          type: number
          example: -73.984
        scheduling:
          type: boolean
          description: Whether online scheduling is open.
        distance:
          type: number
          description: Miles from the requested zip.
    OverviewResponse:
      type: object
      required:
        - orders
        - results
        - webhooks
      properties:
        orders:
          type: object
          required:
            - total
            - by_status
          properties:
            total:
              type: integer
              example: 27
            by_status:
              type: object
              additionalProperties:
                type: integer
              description: Order counts keyed by current fulfilment status string.
              example:
                order.completed: 29
                order.processing: 8
        results:
          type: object
          required:
            - total
            - missing
          properties:
            total:
              type: integer
              example: 7
            missing:
              type: integer
              example: 8
        webhooks:
          type: object
          required:
            - failed_total
            - daily
          properties:
            failed_total:
              type: integer
              example: 5
            daily:
              type: array
              items:
                type: object
                required:
                  - date
                  - failed
                properties:
                  date:
                    type: string
                    example: "2026-05-16"
                  failed:
                    type: integer
                    example: 1
    WebhookDeliveriesResponse:
      type: object
      required:
        - deliveries
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/WebhookDelivery"
        next_cursor:
          type: string
          description: Pass as ?cursor= for the next page; absent on the last page.
          example: "333410942627700737"
    WebhookDelivery:
      type: object
      required:
        - event_id
        - event_type
        - order_id
        - order_item_id
        - outcome
        - final_status_code
        - attempts
        - completed_at
        - event_created_at
      properties:
        event_id:
          type: string
          example: "333410942627700737"
        event_type:
          type: string
          description: Same vocabulary as the webhook event_type field (currently order.status_changed, order_item.status_changed and order_item.results_status_change). Open set - new event types may appear; treat unknown values as deliveries of a newer event family.
          example: order_item.results_status_change
        order_id:
          type: string
          example: "333410942627700736"
        order_item_id:
          type: string
          example: "333410942627700737"
        outcome:
          type: string
          description: "One of: delivered, rejected, invalid, dead_lettered, replayed."
          example: dead_lettered
        final_status_code:
          type:
            - integer
            - "null"
          example: 500
        attempts:
          type: integer
          example: 6
        completed_at:
          type: string
          format: date-time
        event_created_at:
          type: string
          format: date-time
