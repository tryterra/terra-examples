      x-enum-descriptions:
        - Required zero value for proto3
        - United States Dollar (ISO 4217)
        - Euro (ISO 4217)
        - British Pound Sterling (ISO 4217)
      x-enum-varnames:
        - Currency_CURRENCY_UNSPECIFIED
        - Currency_CURRENCY_USD
        - Currency_CURRENCY_EUR
        - Currency_CURRENCY_GBP
    Image:
