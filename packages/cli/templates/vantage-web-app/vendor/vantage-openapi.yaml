            $ref: "#/components/schemas/PSCLocation"
    PSCLocation:
      description: A Patient Service Center (lab draw site).
      type: object
      required:
        - code
        - name
        - address
        - phone
        - latitude
        - longitude
        - scheduling
        - distance
      properties:
        code:
          type: string
          example: PSC12345
        name:
