name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run gen:types && git diff --exit-code src/server/lib/vantage/types.gen.ts
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run format:check
